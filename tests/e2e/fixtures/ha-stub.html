<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Superpro Shutter Card - HA Stub</title>
  <!-- The fake HA host page Playwright drives. We mount the real
       compiled artefact (dist/superpro-shutter-card.js) and a hand-rolled
       hass shim so smoke tests exercise the actual production bundle, not
       a mocked rebuild. The bundle is an IIFE that registers custom
       elements on load. We load it as a classic <script> (not module)
       because file:// + dynamic-import + CORS = fetch failure in
       chromium. -->
  <style>
    body { margin: 24px; font-family: system-ui, sans-serif; background: #fafafa; }
    #card-host { max-width: 320px; }
    #log { margin-top: 24px; padding: 12px; background: #fff; border: 1px solid #ddd; font-family: monospace; font-size: 12px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>HA stub - smoke test page</h1>
  <!-- The card's connectedCallback observes a hui-view ancestor for
       resize. Real HA dashboards always have one; the stub provides a
       hollow placeholder so the ResizeObserver gets a real Element. -->
  <hui-view id="card-host"></hui-view>
  <div id="log">no service calls yet</div>

  <script src="../../../dist/superpro-shutter-card.js"></script>
  <script>
    (async () => {
      // Spy storage: tests inspect window.__serviceCalls to assert that
      // the card invoked the right HA service with the right payload.
      window.__serviceCalls = [];

      // Minimal hass object covering only what the card touches: states
      // map, localize, callService, themes, language. Real HA exposes
      // connection, user, etc. - none read by the card render path.
      const stubHass = {
        states: {
          'cover.test_shutter': {
            entity_id: 'cover.test_shutter',
            state: 'open',
            attributes: {
              friendly_name: 'Test Shutter',
              current_position: 50,
              current_tilt_position: 0,
              // bitmask: open + close + set_position + stop = 0b1111
              supported_features: 15,
            },
          },
        },
        // The card guards every callService with checkServiceAvailability,
        // which reads hass.services[domain][service]. The shape only needs
        // to be truthy per service the card might dispatch - real HA
        // returns full schemas here, but the card only checks existence.
        services: {
          cover: {
            open_cover: {},
            close_cover: {},
            stop_cover: {},
            set_cover_position: {},
            open_cover_tilt: {},
            close_cover_tilt: {},
            stop_cover_tilt: {},
            set_cover_tilt_position: {},
          },
        },
        // localize returns key on miss - matches HA's own behaviour.
        localize: (key) => key,
        callService: (domain, service, data) => {
          window.__serviceCalls.push({ domain, service, data });
          const log = document.getElementById('log');
          log.textContent = JSON.stringify(window.__serviceCalls, null, 2);
          if (service === 'set_cover_position' && data && data.position != null) {
            stubHass.states['cover.test_shutter'].attributes.current_position = data.position;
          }
          return Promise.resolve();
        },
        themes: { darkMode: false },
        language: 'en',
        selectedLanguage: 'en',
      };

      // HA's lifecycle: setConfig BEFORE the element is attached to the
      // DOM, so connectedCallback can rely on this.config being populated.
      // We mirror that order here - if we appended first, the resize
      // observer in connectedCallback would dereference undefined config.
      const card = document.createElement('superpro-shutter-card');
      try {
        await card.setConfig({
          type: 'custom:superpro-shutter-card',
          // Override image_map so the card loads PNGs from the in-repo
          // dist/images/ instead of HA's /local/community/... (which 404s
          // under file://). Path is relative to this HTML document.
          image_map: '../../../dist/images',
          entities: [{ entity: 'cover.test_shutter' }],
        });
      } catch (err) {
        window.__cardError = String(err);
        throw err;
      }
      card.hass = stubHass;
      document.getElementById('card-host').appendChild(card);
      await card.updateComplete;

      window.__card = card;
      window.__cardReady = true;
    })();
  </script>
</body>
</html>
