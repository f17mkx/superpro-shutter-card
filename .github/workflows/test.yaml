name: Test

# Runs on every PR to main and on direct pushes to main. Parallel to
# validate.yaml (the HACS validator). Failing this gate blocks merge.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # The repo commits package-lock.json, so npm ci has a deterministic
          # install. Also enables the built-in npm cache.
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build dist/
        # Rebuild the artefact from src/. Output lands in dist/superpro-shutter-card.js.
        run: npm run build

      - name: Verify dist/ has not drifted
        # HACS users grab dist/ raw - if the committed copy doesn't match the
        # one rollup just produced, the published bundle is stale. The script
        # compares HEAD's dist/superpro-shutter-card.js against the just-built
        # one and fails on byte-mismatch.
        run: node scripts/check-dist-drift.mjs

      - name: Run unit tests
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: npm run test:e2e

      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
